permissions:
  percheggs.use:
    description: Allows using the Perch Eggs
    default: true
  percheggs.admin:
    description: Allows giving Perch Eggs
    default: op
commands:
  percheggs:
    description: Main command for PerchEggs
    usage: /percheggs give <singleuse|multipleuse> [amount]